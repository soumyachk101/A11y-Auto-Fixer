<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sunny Paws Rescue — Adopt a Dog</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #ffffff; color: #222; }
    .hero { padding: 40px; background: #f7f7f7; }
    .cta { background: #7aa7ff; color: #ffffff; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; }
    .subtle { color: #aaaaaa; font-size: 14px; }
    .card { border: 1px solid #ddd; padding: 16px; margin: 16px 40px; border-radius: 8px; }
    .icon-btn { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 8px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Sunny Paws Rescue</h1>
    <h4>Find your new best friend</h4>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Golde33443.jpg/640px-Golde33443.jpg" width="320">
    <p class="subtle">Over 200 dogs adopted this year. Every dog is vaccinated and microchipped.</p>
    <button class="cta">Apply to adopt</button>
  </div>

  <div class="card">
    <h2>Get adoption alerts</h2>
    <p>We'll email you when a new dog arrives.</p>
    <input type="email" placeholder="you@example.com">
    <button class="icon-btn">🔍</button>
  </div>

  <div class="card">
    <h2>Visit us</h2>
    <p class="subtle">Open Tuesday to Sunday, 10am to 4pm.</p>
    <a href="/directions"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Map_symbol_location_02.svg/64px-Map_symbol_location_02.svg.png" width="24"></a>
  </div>
</body>
</html>
